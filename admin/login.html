<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - One Click Computers</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/login-styles.css">
</head>
<body class="login-page">
    <!-- Login Container -->
    <div class="login-container">
        <div class="login-box">
            <!-- Logo -->
            <div class="login-logo">
                <img src="../assets/img/one-logo.png" alt="One Click Computers">
            </div>

            <!-- Login Header -->
            <div class="login-header">
                <h1>Admin Panel</h1>
                <p>Sign in to access the dashboard</p>
            </div>

            <!-- Login Form -->
            <form id="adminLoginForm" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="admin@oneclick.com"
                        required
                        autocomplete="off"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        autocomplete="off"
                    >
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <!-- Submit Button -->
                <button type="submit" id="loginButton" class="login-button">
                    <span class="button-text">Sign In</span>
                    <span class="button-loader" style="display: none;">
                        <svg class="spinner" viewBox="0 0 50 50">
                            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                        </svg>
                        Verifying...
                    </span>
                </button>
            </form>

            <!-- Footer Links -->
            <div class="login-footer">
                <a href="../index.html" class="back-link">← Back to Website</a>
            </div>
        </div>

        <!-- Background Animation -->
        <div class="login-background">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
    </div>

    <!-- Login Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('adminLoginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginButton = document.getElementById('loginButton');
            const buttonText = loginButton.querySelector('.button-text');
            const buttonLoader = loginButton.querySelector('.button-loader');
            const errorMessage = document.getElementById('errorMessage');

            // Show error message
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                errorMessage.classList.add('shake');
                setTimeout(() => {
                    errorMessage.classList.remove('shake');
                }, 500);
            }

            // Hide error message
            function hideError() {
                errorMessage.style.display = 'none';
                errorMessage.textContent = '';
            }

            // Set loading state
            function setLoading(isLoading) {
                if (isLoading) {
                    loginButton.disabled = true;
                    buttonText.style.display = 'none';
                    buttonLoader.style.display = 'flex';
                    loginButton.classList.add('loading');
                } else {
                    loginButton.disabled = false;
                    buttonText.style.display = 'block';
                    buttonLoader.style.display = 'none';
                    loginButton.classList.remove('loading');
                }
            }

            // Login handler - Direct PHP session login
            async function performLogin(email, password) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 20000); // 20 sec timeout

                    console.log('[Login] Attempting login:', { email, password_length: password.length });

                    // Determine API URL - SUPABASE AUTH API
                    const pathParts = window.location.pathname.split('/');
                    const basePath = pathParts.slice(0, -2).join('/');
                    let apiUrl = basePath + '/api/admin-login-supabase.php';

                    console.log('[Login] Current location:', window.location.href);
                    console.log('[Login] API URL:', apiUrl);

                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        credentials: 'include', // Important: include cookies for session
                        body: JSON.stringify({
                            email: email,
                            password: password
                        }),
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    console.log('[Login] Response status:', response.status);
                    console.log('[Login] Response headers:', {
                        'content-type': response.headers.get('content-type')
                    });

                    // Parse response
                    const data = await response.json();

                    console.log('[Login] Response data:', data);

                    if (response.ok && data.success) {
                        // Success - redirect to dashboard
                        console.log('[Login] ✅ Success! User data:', data.user);

                        // Store authentication data
                        localStorage.setItem('admin_logged_in', 'true');
                        localStorage.setItem('admin_email', data.user?.email || email);
                        localStorage.setItem('admin_access_token', data.access_token || '');
                        localStorage.setItem('admin_refresh_token', data.refresh_token || '');
                        localStorage.setItem('admin_data', JSON.stringify({
                            email: data.user?.email || email,
                            name: data.user?.name || data.user?.full_name || 'Admin',
                            role: 'admin'
                        }));
                        sessionStorage.setItem('admin_session_token', 'active');

                        console.log('[Login] ✅ Auth data stored in localStorage');
                        console.log('[Login] 🔄 Redirecting to dashboard in 500ms...');

                        // Redirect to dashboard
                        setTimeout(() => {
                            console.log('[Login] 🚀 Executing redirect now...');
                            window.location.href = 'index.html';
                        }, 500);
                        return true;
                    } else {
                        // Failure - show error
                        const errorMsg = data.message || 'Invalid email or password';
                        console.log('[Login] Failed:', errorMsg);
                        showError(errorMsg);
                        return false;
                    }

                } catch (error) {
                    console.error('[Login] Error:', error);

                    if (error.name === 'AbortError') {
                        showError('Request timeout. Please check your connection.');
                    } else {
                        showError('Login failed: ' + error.message);
                    }
                    return false;
                }
            }

            // Form submit handler
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideError();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Validate inputs
                if (!email || !password) {
                    showError('Please enter both email and password');
                    return;
                }

                // Validate email format
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showError('Please enter a valid email address');
                    return;
                }

                setLoading(true);
                await performLogin(email, password);
                setLoading(false);
            });

            // Clear error on input
            emailInput.addEventListener('input', hideError);
            passwordInput.addEventListener('input', hideError);

            // Auto-focus email field
            emailInput.focus();

            // Check if redirected with a message
            const urlParams = new URLSearchParams(window.location.search);
            const reason = urlParams.get('reason');
            if (reason === 'logout') {
                showError('You have been logged out');
            } else if (reason === 'session') {
                showError('Your session has expired. Please login again.');
            }
        });
    </script>
</body>
</html>
