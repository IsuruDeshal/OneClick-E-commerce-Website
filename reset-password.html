<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Reset Password | One Click Computers</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=18.3" />
  <link rel="stylesheet" href="assets/css/critical-grid.css?v=2" />
</head>
<body class="theme-dark">
  <header class="site-header">
    <div class="container header-top">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu"><span></span><span></span><span></span></button>
      <a href="index.html" class="logo"><img src="assets/img/one-logo.png" alt="One Click Computers" /></a>
      <div class="header-actions">
        <a class="icon-btn mobile-search-btn" href="#" title="Search" id="mobileSearchBtn">🔍</a>
        <a class="icon-btn" href="#" title="Account">👤</a>
        <a class="icon-btn" href="#" title="Cart"><span class="badge">0</span>🛒</a>
      </div>
    </div>
  </header>

  <main class="container section" style="max-width:720px;padding:3rem 0">
    <div class="auth-card">
      <h1>Set a new password</h1>
      <form id="resetForm" class="form">
        <label style="display:block;margin:.6rem 0">Email
          <input id="email" type="email" name="email" placeholder="you@example.com" required />
        </label>
        <label style="display:block;margin:.6rem 0">New Password
          <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required />
        </label>
        <label style="display:block;margin:.6rem 0">Confirm Password
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required />
        </label>
        <div style="display:flex;gap:.6rem;margin-top:1rem">
          <button type="submit" class="btn primary">Reset Password</button>
          <a class="btn" href="admin/login.html">Back to login</a>
        </div>
        <div id="resetMsg" class="form-info" role="status" style="margin-top:1rem;color:var(--muted)"></div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container"><div style="padding:1rem 0;text-align:center;color:var(--muted)">© <span id="yearCopy"></span> One Click Computers</div></div>
  </footer>

  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/supabase-init.js"></script>
  <script src="assets/js/firebase-shim.js"></script>
  <script>
    document.getElementById('yearCopy').textContent = new Date().getFullYear();

    const form = document.getElementById('resetForm');
    const msg = document.getElementById('resetMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      const email = document.getElementById('email').value.trim();
      const p1 = document.getElementById('newPassword').value;
      const p2 = document.getElementById('confirmPassword').value;
      if (!email) return msg.textContent = 'Please enter your email.';
      if (p1.length < 6) return msg.textContent = 'Password must be at least 6 characters.';
      if (p1 !== p2) return msg.textContent = 'Passwords do not match.';

      // Try to update via Supabase (if using Supabase auth)
      try {
        // This is a guidance step — implement server-side password reset or Supabase auth update as needed.
        // For now, localStorage fallback for legacy testing:
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const user = users.find(u => u.email && u.email.toLowerCase() === email.toLowerCase());
        if (!user) {
          msg.textContent = 'No account found for this email.';
          return;
        }
        user.password = p1; // note: plaintext in localStorage only for dev
        localStorage.setItem('users', JSON.stringify(users));
        msg.textContent = 'Password updated locally. Use proper reset flow for production.';
      } catch (err) {
        console.error(err);
        msg.textContent = 'An error occurred. Try again later.';
      }
    });
  </script>
</body>
</html>
