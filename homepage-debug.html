<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage Debug - One Click Computers</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #1a1a1a; color: #0f0; }
    h1 { color: #0ff; }
    .section { background: #222; padding: 1rem; margin: 1rem 0; border-left: 4px solid #0f0; }
    .error { border-color: #f00; color: #f00; }
    .success { border-color: #0f0; color: #0f0; }
    .warning { border-color: #fa0; color: #fa0; }
    pre { background: #000; padding: 1rem; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🔍 Homepage Debug Report</h1>

  <div class="section">
    <h2>1. Supabase Connection</h2>
    <div id="supabaseStatus">Checking...</div>
  </div>

  <div class="section">
    <h2>2. Product Grids Found</h2>
    <div id="gridsFound">Scanning...</div>
  </div>

  <div class="section">
    <h2>3. Products by Category</h2>
    <div id="productsByCategory">Loading...</div>
  </div>

  <div class="section">
    <h2>4. Scripts Loaded</h2>
    <div id="scriptsLoaded">Checking...</div>
  </div>

  <div class="section">
    <h2>5. Console Errors</h2>
    <pre id="consoleErrors">None captured yet...</pre>
  </div>

  <div class="section success">
    <h2>✅ Actions</h2>
    <p><a href="index.html" style="color: #0ff;">← Back to Homepage</a></p>
    <p><a href="system-check.html" style="color: #0ff;">→ Full System Check</a></p>
  </div>

  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/supabase-init.js"></script>
  <script>
    const errors = [];
    const originalError = console.error;
    console.error = function(...args) {
      errors.push(args.join(' '));
      originalError.apply(console, args);
      document.getElementById('consoleErrors').textContent = errors.join('\n') || 'No errors';
    };

    (async function() {
      // 1. Supabase
      try {
        const supabase = await window.ensureSupabase();
        document.getElementById('supabaseStatus').innerHTML = '<span class="success">✓ Connected</span>';

        // 2. Check grids on homepage
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = 'index.html';
        document.body.appendChild(iframe);

        iframe.onload = async function() {
          const doc = iframe.contentDocument;
          const grids = doc.querySelectorAll('[data-products-grid]');

          let gridInfo = `<p>Found ${grids.length} grid(s):</p><ul>`;
          grids.forEach((grid, i) => {
            const category = grid.getAttribute('data-category') || 'ALL';
            const limit = grid.getAttribute('data-limit') || 'no limit';
            gridInfo += `<li>Grid ${i+1}: Category="${category}", Limit=${limit}</li>`;
          });
          gridInfo += '</ul>';
          document.getElementById('gridsFound').innerHTML = gridInfo;
        };

        // 3. Products by category
        const { data: products } = await supabase
          .from('products')
          .select('category')
          .eq('status', 'active');

        const categoryCounts = {};
        products.forEach(p => {
          const cat = p.category || 'Uncategorized';
          categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
        });

        let catInfo = '<ul>';
        Object.entries(categoryCounts).sort((a,b) => b[1] - a[1]).forEach(([cat, count]) => {
          catInfo += `<li>${cat}: ${count} product(s)</li>`;
        });
        catInfo += '</ul>';
        document.getElementById('productsByCategory').innerHTML = catInfo;

        // 4. Scripts
        const scripts = [
          'assets/js/supabase-config.js',
          'assets/js/supabase-init.js',
          'assets/js/backend-products.js'
        ];
        let scriptInfo = '<ul>';
        scripts.forEach(src => {
          const exists = !!Array.from(document.scripts).find(s => s.src.includes(src));
          scriptInfo += `<li class="${exists?'success':'error'}">${exists?'✓':'✗'} ${src}</li>`;
        });
        scriptInfo += '</ul>';
        document.getElementById('scriptsLoaded').innerHTML = scriptInfo;

      } catch (err) {
        document.getElementById('supabaseStatus').innerHTML = '<span class="error">✗ ' + (err.message || 'Failed') + '</span>';
      }
    })();
  </script>
</body>
</html>
