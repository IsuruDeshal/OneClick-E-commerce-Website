<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | One Click Computers</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=18.1" />
  <link rel="stylesheet" href="assets/css/critical-grid.css?v=2" />
</head>
<body class="theme-dark">
  <header class="site-header">
    <div class="container header-top">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu"><span></span><span></span><span></span></button>
      <a href="index.html" class="logo"><img src="assets/img/one-logo.png" alt="One Click Computers" /></a>
      <div class="header-actions">
        <a class="icon-btn mobile-search-btn" href="#" title="Search" id="mobileSearchBtn">🔍</a>
        <a class="icon-btn" href="#" title="Account">👤</a>
        <a class="icon-btn" href="#" title="Cart"><span class="badge">0</span>🛒</a>
      </div>
    </div>
    <div class="mobile-search-bar" id="mobileSearchBar"><div class="container"><form class="search"><input type="search" placeholder="Search for products.." aria-label="Search" /><button type="submit" aria-label="Search">🔍</button></form></div></div>
  </header>

  <main class="container section">
    <div class="auth-card">
      <h1>Forgot your password?</h1>
      <p class="muted">Enter your email address and we’ll send you a password reset link.</p>
      <form id="forgotForm" class="form">
        <label>Email
          <input type="email" placeholder="you@example.com" required />
        </label>
        <button type="submit" class="btn primary full-width">Send Reset Link</button>
        <div id="forgotMsg" class="form-info" role="status"></div>
      </form>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/supabase-init.js"></script>
  <script src="assets/js/firebase-shim.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = this.querySelector('input[type="email"]').value.trim();
      const msg = document.getElementById('forgotMsg');
      if(!email){ msg.textContent = 'Enter your email'; return }
      // Local dev fallback: store a reset token in localStorage (NOT for production)
      const token = Math.random().toString(36).slice(2,10);
      const tokens = JSON.parse(localStorage.getItem('pw_reset_tokens')||'{}');
      tokens[email] = { token, created: Date.now() };
      localStorage.setItem('pw_reset_tokens', JSON.stringify(tokens));
      msg.textContent = 'Reset link generated (dev): token=' + token;
    });
  </script>
</body>
</html>
