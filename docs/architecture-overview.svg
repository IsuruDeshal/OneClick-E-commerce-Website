<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1200" viewBox="0 0 1700 1200" font-family="Segoe UI, Roboto, sans-serif">
  <defs>
    <style><![CDATA[
      .title { font-size:28px; fill:#e9ecf1; font-weight:600; }
      .label { font-size:14px; fill:#e9ecf1; }
      .small { font-size:12px; fill:#a9b0bf; }
      .box { fill:#0e0f14; stroke-width:2; rx:8; ry:8; }
      .frontend { stroke:#e44d61; }
      .backend { stroke:#e44d61; fill:#1a1e29; }
      .db { stroke:#3b82f6; fill:#151821; }
      .storage { stroke:#f59e0b; fill:#1a1e29; }
      .realtime { stroke:#22c55e; fill:#1a1e29; }
      .security { stroke:#ef4444; fill:#151821; }
      .arrow { stroke:#e9ecf1; stroke-width:1.6; fill:none; marker-end:url(#arrowhead); }
      .arrow-db { stroke:#3b82f6; marker-end:url(#arrowheadBlue); }
      .arrow-green { stroke:#22c55e; marker-end:url(#arrowheadGreen); }
      .arrow-gold { stroke:#ffcc66; marker-end:url(#arrowheadGold); }
      .shadow { filter:url(#shadow); }
    ]]></style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e9ecf1" />
    </marker>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" />
    </marker>
    <marker id="arrowheadGold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffcc66" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0e0f14" />
  <text x="50%" y="50" text-anchor="middle" class="title">One Click Computers – System Architecture</text>
  <text x="50%" y="85" text-anchor="middle" class="small">Frontend ⇄ Backend ⇄ Supabase DB ⇄ Realtime ⇄ Storage | Auth & Security Flows Included</text>

  <!-- Frontend Box -->
  <rect x="40" y="130" width="420" height="620" class="box frontend shadow" />
  <text x="60" y="160" class="label" font-weight="600">Frontend Pages</text>
  <text x="60" y="185" class="small">index.html (Home: Header, Banner, Grid, Carousels, Reviews, FAQ, Footer)</text>
  <text x="60" y="205" class="small">Category: laptops.html, desktops.html, monitors.html, printers.html, graphics-card.html, keyboard.html, mouse.html</text>
  <text x="60" y="225" class="small">User: account.html, wishlist.html, cart.html, checkout.html</text>
  <text x="60" y="245" class="small">Info: about.html, services.html, contact.html, terms-conditions.html, privacy-policy.html, sitemap.html</text>
  <text x="60" y="265" class="small">Admin: /admin/login.html, /admin/index.html (Products/Orders/Users/Payments), /admin/add-product.html, /admin/edit-product.html</text>
  <text x="60" y="295" class="small">Assets: styles.css, admin.css</text>
  <text x="60" y="315" class="small">Loaders: backend-products.js, product-loader.js</text>
  <text x="60" y="335" class="small">Search: search.js + global search-init.js</text>
  <text x="60" y="355" class="small">Cart: cart-manager.js (localStorage/user_carts)</text>
  <text x="60" y="375" class="small">Auth UI: login.html, register.html</text>
  <text x="60" y="395" class="small">Navigation Loop: cart → checkout → account → orders → home</text>
  <text x="60" y="415" class="small">Realtime Refresh integrated for products/orders</text>
  <text x="60" y="435" class="small">Product Details: product-details.html dynamic specs</text>
  <text x="60" y="455" class="small">Wishlist & Cart dynamic sync fallback localStorage</text>
  <text x="60" y="475" class="small">All pages can fetch products (active status=active)</text>

  <!-- Backend Box -->
  <rect x="500" y="130" width="320" height="420" class="box backend shadow" />
  <text x="520" y="160" class="label" font-weight="600">Backend (PHP APIs)</text>
  <text x="520" y="185" class="small">api/get-products.php</text>
  <text x="520" y="205" class="small">api/admin-login.php</text>
  <text x="520" y="225" class="small">api/check-admin-session.php</text>
  <text x="520" y="245" class="small">api/admin-save-product.php</text>
  <text x="520" y="265" class="small">api/admin-delete-product.php</text>
  <text x="520" y="285" class="small">api/create-order.php</text>
  <text x="520" y="305" class="small">api/get-orders.php</text>
  <text x="520" y="325" class="small">api/admin-logout.php</text>
  <text x="520" y="350" class="small">config-local.php (CORS + Session)</text>
  <text x="520" y="370" class="small">db_connect_universal.php</text>
  <text x="520" y="390" class="small">Mode Switch: Local XAMPP vs Supabase direct</text>
  <text x="520" y="410" class="small">Returns JSON → consumed by loaders & dashboard</text>

  <!-- Database Box -->
  <rect x="860" y="130" width="360" height="560" class="box db shadow" />
  <text x="880" y="160" class="label" font-weight="600">Supabase Database Schema</text>
  <text x="880" y="185" class="small">users (id, email, role, full_name, ...)</text>
  <text x="880" y="205" class="small">products (id, name, sku, category, price, offer_price, stock, image_url, image_urls[], status, featured, tags[])</text>
  <text x="880" y="225" class="small">orders (id, user_id, order_number, status, items JSONB, totals)</text>
  <text x="880" y="245" class="small">wishlists (user_id, product_id UNIQUE)</text>
  <text x="880" y="265" class="small">user_carts (user_id UNIQUE, items JSONB)</text>
  <text x="880" y="285" class="small">categories (id, name, slug, parent_id)</text>
  <text x="880" y="305" class="small">product_reviews (id, product_id, user_id, rating, review_text)</text>
  <text x="880" y="330" class="small">Relationships:</text>
  <text x="900" y="350" class="small">orders.user_id → users.id</text>
  <text x="900" y="370" class="small">wishlists.(user_id, product_id) → users/products</text>
  <text x="900" y="390" class="small">user_carts.user_id → users.id</text>
  <text x="900" y="410" class="small">product_reviews.(product_id,user_id)</text>
  <text x="900" y="430" class="small">categories.parent_id → categories.id (hierarchy)</text>
  <text x="880" y="455" class="small">RLS Policies enforce role & ownership</text>
  <text x="880" y="475" class="small">Public: SELECT active products</text>
  <text x="880" y="495" class="small">Admin: Full write (role=admin)</text>
  <text x="880" y="515" class="small">Trigger: handle_new_user() creates profile row</text>
  <text x="880" y="535" class="small">Realtime enabled on products & orders</text>

  <!-- Storage Box -->
  <rect x="1240" y="130" width="180" height="150" class="box storage shadow" />
  <text x="1255" y="160" class="label" font-weight="600">Storage (Images)</text>
  <text x="1255" y="185" class="small">Bucket: images/</text>
  <text x="1255" y="205" class="small">products.image_url</text>
  <text x="1255" y="225" class="small">products.image_urls[]</text>
  <text x="1255" y="245" class="small">CDN / Signed (future)</text>

  <!-- Realtime Box -->
  <rect x="1240" y="310" width="180" height="160" class="box realtime shadow" />
  <text x="1255" y="340" class="label" font-weight="600">Realtime Channels</text>
  <text x="1255" y="365" class="small">public:products</text>
  <text x="1255" y="385" class="small">public:orders</text>
  <text x="1255" y="405" class="small">Products change ⇒ refresh grids</text>
  <text x="1255" y="425" class="small">Orders change ⇒ admin dashboard refresh</text>

  <!-- Security Box -->
  <rect x="1240" y="500" width="180" height="190" class="box security shadow" />
  <text x="1255" y="530" class="label" font-weight="600">Security Layers</text>
  <text x="1255" y="555" class="small">Supabase Auth (JWT)</text>
  <text x="1255" y="575" class="small">JWT claims role=user/admin</text>
  <text x="1255" y="595" class="small">RLS enforces per-table rules</text>
  <text x="1255" y="615" class="small">PHP Session (ONECLICK_SESSION)</text>
  <text x="1255" y="635" class="small">Admin login via API</text>
  <text x="1255" y="655" class="small">Protected endpoints require session/JWT</text>

  <!-- Navigation Loop Annotation -->
  <rect x="40" y="780" width="420" height="120" class="box frontend shadow" />
  <text x="60" y="810" class="label" font-weight="600">User Journey Loop</text>
  <text x="60" y="835" class="small">Browse → cart.html → checkout.html → api/create-order.php → orders table → account.html (orders) → home</text>
  <text x="60" y="855" class="small">Realtime updates reflect new orders & product changes instantly</text>

  <!-- Arrows: Frontend to Backend -->
  <path d="M460 300 C480 300 490 300 500 300" class="arrow" />
  <text x="465" y="290" class="small" fill="#ffcc66">fetch()</text>

  <!-- Backend to DB (products) -->
  <path d="M820 300 C840 300 850 300 860 300" class="arrow-db" />
  <text x="825" y="290" class="small" fill="#3b82f6">SELECT active products</text>

  <!-- Direct Supabase (frontend to DB) -->
  <path d="M460 340 C620 340 700 220 860 220" class="arrow-db" stroke-dasharray="4 4" />
  <text x="620" y="230" class="small" fill="#3b82f6">supabase.from('products')</text>

  <!-- Products to Storage -->
  <path d="M1220 200 L1240 200" class="arrow-gold" />
  <text x="1225" y="190" class="small" fill="#ffcc66">image_url</text>

  <!-- Products to Realtime -->
  <path d="M1220 360 L1240 360" class="arrow-green" />
  <text x="1225" y="350" class="small" fill="#22c55e">changes</text>

  <!-- Orders to Realtime -->
  <path d="M1220 400 L1240 400" class="arrow-green" />
  <text x="1225" y="390" class="small" fill="#22c55e">changes</text>

  <!-- Auth flow (login/register to JWT) -->
  <path d="M250 430 C250 580 1340 580 1340 560" class="arrow" stroke-dasharray="6 3" />
  <text x="600" y="570" class="small" fill="#e9ecf1">login/register → supabase.auth → JWT</text>

  <!-- JWT to RLS -->
  <path d="M1340 560 L1340 595" class="arrow" />
  <text x="1350" y="580" class="small" fill="#e9ecf1">claims</text>

  <!-- Admin login to PHP Session -->
  <path d="M250 265 C520 90 1390 520 1390 540" class="arrow" stroke-dasharray="6 3" />
  <text x="640" y="120" class="small" fill="#e9ecf1">admin-login.php → session_start()</text>

  <!-- Checkout flow arrows -->
  <path d="M250 365 C400 450 580 450 640 450" class="arrow" />
  <text x="400" y="445" class="small" fill="#e9ecf1">cart → checkout</text>
  <path d="M640 450 C700 450 820 450 860 450" class="arrow-db" />
  <text x="700" y="440" class="small" fill="#3b82f6">create-order.php → orders</text>
  <path d="M1220 450 L1260 450" class="arrow-green" />
  <text x="1225" y="440" class="small" fill="#22c55e">orders change</text>

  <!-- Orders to Account (navigation loop) -->
  <path d="M860 470 C700 600 250 600 250 395" class="arrow" stroke-dasharray="4 4" />
  <text x="450" y="590" class="small" fill="#e9ecf1">account.html shows updated orders</text>

  <!-- Legend -->
  <rect x="40" y="930" width="1380" height="200" class="box frontend" stroke="#272a36" fill="#151821" />
  <text x="60" y="960" class="label" font-weight="600">Legend</text>
  <text x="60" y="985" class="small" fill="#e44d61">Red Border: Frontend Pages</text>
  <text x="320" y="985" class="small" fill="#e44d61">Dark Red: Backend APIs</text>
  <text x="560" y="985" class="small" fill="#3b82f6">Blue: Database & Data Paths</text>
  <text x="780" y="985" class="small" fill="#f59e0b">Gold: Storage (images)</text>
  <text x="1000" y="985" class="small" fill="#22c55e">Green: Realtime channels</text>
  <text x="1220" y="985" class="small" fill="#ef4444">Red (Security): JWT / Session</text>
  <text x="60" y="1010" class="small">Solid Arrow: primary data/API call</text>
  <text x="320" y="1010" class="small">Dashed Arrow: auth/session & secondary flow</text>
  <text x="560" y="1010" class="small">Gray Text: descriptive labels</text>
  <text x="780" y="1010" class="small">Loop: Navigation cycle after purchase</text>
  <text x="1000" y="1010" class="small">image_url & image_urls[] served from Storage</text>
  <text x="1220" y="1010" class="small">RLS uses JWT claims (role)</text>

  <!-- Footer Annotation -->
  <text x="50%" y="1160" text-anchor="middle" class="small" fill="#a9b0bf">Generated architecture diagram – update via manual SVG edits or Mermaid export replacement</text>
</svg>
