<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop - OneClick Computers</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <style>
    .categories { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 40px; }
    .category-card { background: #222; padding: 20px; border-radius: 8px; cursor: pointer; border: 2px solid #444; transition: all 0.2s; }
    .category-card:hover { border-color: #e44d61; background: #2a2a2a; }
    .category-card h3 { margin: 0; color: #e44d61; }
    .search-box { margin-bottom: 30px; }
    .search-box input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; }
    .search-box input::placeholder { color: #888; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #444; border-top-color: #e44d61; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: #b71c1c; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .empty-state { text-align: center; padding: 40px; background: #1a1a1a; border-radius: 8px; color: #888; }
    .loading { text-align: center; padding: 40px; }
  </style>
</head>
<body class="theme-dark">
  <!-- Auth Header (Phase 2) -->
  <div id="header" style="display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#1a1a1a; border-bottom:1px solid #444;">
    <span style="font-weight:700; color:#e44d61;">One Click</span>
    <div style="display:flex; gap:15px; align-items:center;">
      <a href="account.html" id="account-link" style="display:none; text-decoration:none; color:#e44d61;">My Account</a>
      <a href="admin/index.html" id="admin-link" style="display:none; text-decoration:none; color:#e44d61;">Admin</a>
      <button id="logout-btn" onclick="handleLogout()" style="display:none; background:none; border:none; color:#e44d61; cursor:pointer; font-size:14px;">Logout</button>
      <a href="login.html" id="login-btn" style="text-decoration:none; color:#e44d61;">Login</a>
    </div>
  </div>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-top">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <a href="index.html" class="logo">
        <img src="assets/img/one-logo.png" alt="One Click Computers"/>
      </a>
      <div class="header-actions">
        <a class="icon-btn" href="account.html" title="Account"><i class="fas fa-user"></i></a>
        <a class="icon-btn" href="cart.html" title="Cart">
          <span class="badge" data-cart-count>0</span>
          <i class="fas fa-shopping-cart"></i>
        </a>
      </div>
    </div>
  </header>

  <main class="container section" style="padding: 30px 0;">
    <!-- Search (Issue #8, #11) -->
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search products (e.g., laptop, mouse)...">
    </div>

    <!-- Error Display -->
    <div id="error-message"></div>

    <!-- Loading State -->
    <div id="loading-spinner" class="loading" style="display: none;">
      <div class="spinner"></div> Loading products...
    </div>

    <!-- Categories (Issue #13) -->
    <div id="categories-list"></div>

    <!-- Search Results -->
    <div id="search-results" style="display:none;"></div>

    <!-- Products Grid -->
    <div class="product-container product-grid-vertical" id="products-list"></div>

    <!-- Empty State (Issue #10) -->
    <div id="emptyState" class="empty-state" style="display: none;">
      No products found. Try a different search or browse categories above.
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <div class="link-column"><h4>Quick Links</h4>
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- Phase 2: Script imports for shop (Issues #5, #11, #13) -->
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/supabase-init.js"></script>
  <script src="api/cart-unified.js"></script>
  <script src="api/auth-guard.js"></script>
  <script src="api/product-realtime.js"></script>
  <script src="assets/js/product-card-handler.js"></script>
  <script>
    // Cart count badge update
    async function updateCartBadge() {
      const items = await window.getCart();
      const badge = document.querySelector('[data-cart-count]');
      if (badge) {
        badge.textContent = items.length || 0;
      }
    }

    // Load products from Supabase (cached)
    async function loadProducts(category = null, search = null) {
      try {
        const supabase = await window.ensureSupabase();
        
        let query = supabase
          .from('products')
          .select('id, name, price, image_url, category, description, stock')
          .eq('status', 'active');

        if (category) {
          query = query.eq('category', category);
        }

        if (search) {
          // Search in multiple fields: name, description, category
          query = query.or(`name.ilike.%${search}%,description.ilike.%${search}%,category.ilike.%${search}%`);
        }

        const { data: products, error } = await query.order('created_at', { ascending: false });

        if (error) {
          console.error('Product load error:', error);
          showError('Failed to load products: ' + error.message);
          return [];
        }

        return products || [];
      } catch (error) {
        console.error('Error:', error);
        showError('Error: ' + error.message);
        return [];
      }
    }

    // Display products
    async function displayProducts(products) {
      const productList = document.getElementById('products-list');
      const emptyState = document.getElementById('emptyState');

      if (!products || products.length === 0) {
        productList.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      productList.setAttribute('data-product-grid', 'true');
      
      productList.innerHTML = products.map(p => `
        <div class="p-card" data-product-id="${p.id}" style="cursor: pointer;">
          <a href="product-details.html?id=${p.id}" class="media">
            ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : '<div style="background: #333; height: 200px;"></div>'}
          </a>
          <div class="body">
            <a href="product-details.html?id=${p.id}" class="title" data-product-name>${p.name}</a>
            <div class="meta">${p.category || 'Uncategorized'}</div>
            ${p.description ? `<div class="price"><span class="now">LKR ${Math.floor(p.price || 0).toLocaleString()}</span></div>` : ''}
          </div>
        </div>
      `).join('');

      // Initialize click handlers for product cards
      if (window.initProductCardLinks) {
        window.initProductCardLinks();
      }
    }

    // Add product to cart
    async function addProductToCart(productId, name, price) {
      try {
        const result = await window.addToCart(productId, 1);
        if (result.success) {
          alert(`✓ Added "${name}" to cart!`);
          updateCartBadge();
        } else {
          alert('Failed to add to cart');
        }
      } catch (error) {
        console.error('Error adding to cart:', error);
      }
    }

    // Filter by category
    window.filterByCategory = async function(categoryId) {
      showLoading();
      const products = await loadProducts(categoryId);
      displayProducts(products);
      hideLoading();
    };

    // Search products
    document.addEventListener('DOMContentLoaded', () => {
      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.addEventListener('input', async (e) => {
          const search = e.target.value.trim();

          if (search.length === 0) {
            showLoading();
            const products = await loadProducts();
            displayProducts(products);
            hideLoading();
            return;
          }

          if (search.length < 2) return;

          showLoading();
          const products = await loadProducts(null, search);
          displayProducts(products);
          hideLoading();
        });
      }

      // Initialize page
      initShop();
    });

    // Show/hide loading
    function showLoading() {
      document.getElementById('loading-spinner').style.display = 'block';
    }

    function hideLoading() {
      document.getElementById('loading-spinner').style.display = 'none';
    }

    // Show error
    function showError(msg) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.innerHTML = `<div class="error-msg">${msg}</div>`;
    }

    // Initialize shop
    async function initShop() {
      try {
        showLoading();
        updateCartBadge();
        
        // Load initial products
        const products = await loadProducts();
        displayProducts(products);
        hideLoading();
      } catch (error) {
        console.error('Init error:', error);
        showError('Failed to load products. Please refresh the page.');
        hideLoading();
      }
    }

    // Add CSS for highlight animation
    const style = document.createElement('style');
    style.textContent = `
      .highlight-change {
        animation: highlight 0.5s ease-out;
      }
      @keyframes highlight {
        0% { background-color: rgba(228, 77, 97, 0.3); }
        100% { background-color: transparent; }
      }
      .fade-out {
        animation: fadeOut 0.3s ease-out forwards;
      }
      @keyframes fadeOut {
        0% { opacity: 1; }
        100% { opacity: 0; }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
